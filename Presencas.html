<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Presenças | Sistema Presença</title>
    <link rel="stylesheet" href="assets/css/Dashboard.css">
    <link rel="stylesheet" href="assets/css/Presencas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Sistema Presença</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="Dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="Turmas.html"><i class="fas fa-users-rectangle"></i> Turmas</a>
            <a href="Alunos.html"><i class="fas fa-user-graduate"></i> Alunos</a>
            <a href="Listagem_presenca.html"><i class="fas fa-clipboard-check"></i> Presenças</a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-title">
                <h1>Registro de Presenças</h1>
                <p>Visualize as confirmações de presença por turma em tempo real.</p>
            </div>
            <button class="btn-refresh" onclick="loadPresenceHistory()">
                <i class="fas fa-sync-alt"></i> Atualizar Dados
            </button>
        </header>

        <section class="presence-content">
            <div id="presenceContainer" class="presence-grid">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Buscando registros no servidor...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="assets/js/Presencas.js"></script>
</body>
</html>
