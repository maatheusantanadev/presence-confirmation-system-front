<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Presenças | EduPass</title>
    <link rel="stylesheet" href="assets/css/Presencas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-layout">
        <main class="main-content">
            <header class="content-header">
                <div>
                    <h1><i class="fas fa-clipboard-check"></i> Registro de Presenças</h1>
                    <p>Visualize as confirmações de presença por turma em tempo real.</p>
                </div>
                <button class="btn-refresh" onclick="loadPresenceHistory()">
                    <i class="fas fa-sync-alt"></i> Atualizar
                </button>
            </header>

            <div id="presenceContainer" class="presence-grid">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Buscando registros no servidor...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/Presencas.js"></script>
</body>
</html>
