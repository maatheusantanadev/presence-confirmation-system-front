<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turmas | Sistema Presença</title>
    <link rel="stylesheet" href="assets/css/Dashboard.css">
    <link rel="stylesheet" href="../assets/css/Turmas.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Sistema Presença</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="Dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="Turmas.html" class="active"><i class="fas fa-users-rectangle"></i> Turmas</a>
            <a href="Alunos.html"><i class="fas fa-user-graduate"></i> Alunos</a>
            <a href="Presencas.html"><i class="fas fa-clipboard-check"></i> Presenças</a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-titles">
                <h1>Gerenciar Turmas</h1>
                <p>Visualize e organize os grupos de alunos e professores.</p>
            </div>
            <button class="btn-primary" onclick="location.href='Cadastrar_Turmas.html'">
                <i class="fas fa-plus"></i> Nova Turma
            </button>
        </header>

        <section class="content-section">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchGroup" placeholder="Buscar turma pelo nome...">
            </div>

            <div class="groups-grid" id="groupsGrid">
                <div class="loading">Carregando turmas...</div>
            </div>
        </section>
    </main>

    <div id="groupModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-header">
                <h2 id="modalGroupName">Nome da Turma</h2>
                <span class="badge" id="modalGroupBadge">ID: 00</span>
            </div>
            <hr>
            <div class="modal-body">
                <div class="info-section">
                    <h3><i class="fas fa-chalkboard-teacher"></i> Professor Responsável</h3>
                    <p id="modalProfessorName">Nome do Professor</p>
                    <small id="modalProfessorCPF">CPF: 000.000.000-00</small>
                </div>

                <div class="info-section">
                    <h3><i class="fas fa-users"></i> Alunos Matriculados</h3>
                    <ul class="student-list" id="modalStudentList">
                        </ul>
                </div>
            </div>
        </div>
    </div>

    <script src="../assets/js/Turmas.js"></script>
</body>
</html>
