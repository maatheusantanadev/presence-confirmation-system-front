<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Professor | Sistema Presença</title>
    <link rel="stylesheet" href="./assets/css/Cadastro_user.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="form-card animate-in">
        <div class="form-header">
            <div class="icon-circle">
                <i class="fas fa-chalkboard-teacher"></i>
            </div>
            <h1>Criar Conta Professor</h1>
            <p>O CPF será utilizado para gerenciar suas turmas.</p>
        </div>

        <form id="registerForm">
            <div id="apiResponse" class="message" style="display: none; margin-bottom: 1rem;"></div>

            <div class="form-group">
                <label for="full_name">Nome Completo</label>
                <input type="text" id="full_name" name="full_name" placeholder="Ex: Matheus Santana" required>
                <span class="error-message">Insira seu nome completo (mín. 3 letras).</span>
            </div>

            <div class="form-group">
                <label for="cpf">CPF (Apenas números)</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required>
                <span class="error-message">CPF inválido. Insira 11 dígitos.</span>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Seu apelido de login" required>
                <span class="error-message">O username deve ter entre 3 e 20 caracteres.</span>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="Mín. 6 caracteres + 1 Número + 1 Maiúscula" required>
                <span class="error-message">Mínimo 6 caracteres, 1 número e 1 letra maiúscula.</span>
            </div>

            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <button type="submit" class="btn-primary">
                    <i class="fas fa-check"></i> Registrar
                </button>
            </div>
        </form>
    </div>

    <script src="./assets/js/Cadastro_user.js"></script>
</body>
</html>
